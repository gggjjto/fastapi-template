services:

  # ── Application ───────────────────────────────────────────────────────────
  api:
    build: .
    env_file:
      - .env
    environment:
      APP_DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/app
      APP_DB_CREATE_TABLES_ON_STARTUP: "false"  # use Alembic in prod
      APP_REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app          # hot-reload in dev; remove in prod image builds
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Worker (Arq) ─────────────────────────────────────────────────────────
  # Uncomment when you have tasks in app/worker.py
  # worker:
  #   build: .
  #   env_file:
  #     - .env
  #   environment:
  #     APP_REDIS_URL: redis://redis:6379/0
  #   depends_on:
  #     redis:
  #       condition: service_healthy
  #   command: arq app.worker.WorkerSettings

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  postgres_data:
  redis_data:
