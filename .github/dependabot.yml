version: 2
updates:
  # Python 依赖（pyproject.toml / uv.lock）
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "python"
    groups:
      # pytest 生态需要一起升级，否则 pytest 9 会和 pytest-asyncio 0.x 冲突
      pytest:
        patterns:
          - "pytest"
          - "pytest-*"
      # 其余次要/补丁版本合并为一个 PR，减少噪音
      python-minor-patch:
        update-types:
          - "minor"
          - "patch"
        exclude-patterns:
          - "pytest"
          - "pytest-*"
    ignore:
      # arq<=0.28 仍依赖 redis<6，屏蔽 redis 的 major 升级直到 arq 兼容
      - dependency-name: "redis"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Dockerfile 基础镜像
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "docker"
      include: "scope"
    labels:
      - "dependencies"
      - "docker"
